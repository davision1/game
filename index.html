<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flight Earth 3D REAL</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body, #cesiumContainer {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
}

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 10px;
  border-radius: 8px;
  z-index: 10;
}
</style>
</head>

<body>

<div id="cesiumContainer"></div>
<div id="hud">Clique em qualquer lugar do planeta 🌍</div>

<script>
/* ================= CESIUM ================= */

Cesium.Ion.defaultAccessToken = ""; // pode deixar vazio

const viewer = new Cesium.Viewer("cesiumContainer", {
  terrain: Cesium.Terrain.fromWorldTerrain(),
  animation: false,
  timeline: false
});

/* ================= AVIÃO ================= */

let planeEntity = null;
let heading = 0;

/* ================= CLICK SPAWN ================= */

const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

handler.setInputAction(function(click) {

  const cartesian = viewer.scene.pickPosition(click.position);

  if (!cartesian) return;

  const cartographic = Cesium.Cartographic.fromCartesian(cartesian);

  const lat = Cesium.Math.toDegrees(cartographic.latitude);
  const lon = Cesium.Math.toDegrees(cartographic.longitude);

  spawnPlane(lat, lon);

}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

/* ================= SPAWN ================= */

function spawnPlane(lat, lon){

  if (planeEntity) {
    viewer.entities.remove(planeEntity);
  }

  planeEntity = viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(lon, lat, 200),
    model: {
      uri: "https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/CesiumAir/CesiumAir.glb",
      minimumPixelSize: 64
    }
  });

  viewer.trackedEntity = planeEntity;
}

/* ================= CONTROLES ================= */

const keys = {};

window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

/* ================= MOVIMENTO ================= */

viewer.clock.onTick.addEventListener(function(){

  if (!planeEntity) return;

  let pos = planeEntity.position.getValue(viewer.clock.currentTime);

  let carto = Cesium.Cartographic.fromCartesian(pos);

  let lat = Cesium.Math.toDegrees(carto.latitude);
  let lon = Cesium.Math.toDegrees(carto.longitude);
  let height = carto.height;

  const speed = 0.0005;

  if (keys["KeyW"]) lat += speed;
  if (keys["KeyS"]) lat -= speed;
  if (keys["KeyA"]) lon -= speed;
  if (keys["KeyD"]) lon += speed;

  if (keys["ShiftLeft"]) height += 50;
  if (keys["ControlLeft"]) height -= 50;

  const newPos = Cesium.Cartesian3.fromDegrees(lon, lat, height);

  planeEntity.position = newPos;

});
</script>

</body>
</html>
