<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Earth</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.124.0/build/three.js"></script>

<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

#mapScreen {
  position:fixed; inset:0; z-index:20;
}
#map { width:100%; height:100%; }

#startFlight {
  position:absolute;
  bottom:20px; left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  font-size:16px;
  background:#ffd166;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#hud {
  position:fixed; top:10px; left:10px;
  background:rgba(0,0,0,0.5);
  color:white; padding:10px;
  border-radius:8px;
  z-index:10;
}
</style>
</head>

<body>

<div id="mapScreen">
  <div id="map"></div>
  <button id="startFlight">Voar aqui</button>
</div>

<div id="hud">Clique no mapa</div>

<script>
let selectedLat = 0, selectedLon = 0;
let currentLat = 0, currentLon = 0;

/* ================= MAPA ================= */

const map = L.map('map').setView([0,0],2);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19
}).addTo(map);

let marker;

map.on('click', e=>{
  selectedLat = e.latlng.lat;
  selectedLon = e.latlng.lng;

  if(marker) map.removeLayer(marker);
  marker = L.marker([selectedLat,selectedLon]).addTo(map);
});

/* ================= THREE ================= */

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight,0.1,5000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* luz */
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(100,200,100);
scene.add(light);

/* avião */
const plane = new THREE.Mesh(
  new THREE.BoxGeometry(5,2,10),
  new THREE.MeshStandardMaterial({color:0xff4444})
);
scene.add(plane);

/* ================= TILE SYSTEM ================= */

const TILE_SIZE = 256;
const ZOOM = 15;
const tiles = new Map();

function latLonToTile(lat, lon, zoom){
  const x = Math.floor((lon+180)/360*Math.pow(2,zoom));
  const y = Math.floor(
    (1-Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*Math.pow(2,zoom)
  );
  return {x,y};
}

function tileToWorld(x,y){
  return {x:x*TILE_SIZE, z:y*TILE_SIZE};
}

function createTile(x,y){
  const id = x+","+y;
  if(tiles.has(id)) return;

  const tex = new THREE.TextureLoader().load(
    `https://tile.openstreetmap.org/${ZOOM}/${x}/${y}.png`
  );

  const geo = new THREE.PlaneGeometry(TILE_SIZE,TILE_SIZE);
  geo.rotateX(-Math.PI/2);

  const mat = new THREE.MeshBasicMaterial({map:tex});

  const mesh = new THREE.Mesh(geo,mat);

  const pos = tileToWorld(x,y);
  mesh.position.set(pos.x,0,pos.z);

  scene.add(mesh);
  tiles.set(id,mesh);

  /* prédios fake */
  if(Math.random()<0.2){
    const b = new THREE.Mesh(
      new THREE.BoxGeometry(20,Math.random()*100,20),
      new THREE.MeshStandardMaterial({color:0x888888})
    );
    b.position.set(pos.x, b.geometry.parameters.height/2, pos.z);
    scene.add(b);
  }
}

function updateTiles(){
  const t = latLonToTile(currentLat,currentLon,ZOOM);

  for(let dx=-2;dx<=2;dx++){
    for(let dy=-2;dy<=2;dy++){
      createTile(t.x+dx, t.y+dy);
    }
  }
}

/* ================= START ================= */

document.getElementById("startFlight").onclick = ()=>{
  document.getElementById("mapScreen").style.display="none";

  currentLat = selectedLat;
  currentLon = selectedLon;

  const t = latLonToTile(currentLat,currentLon,ZOOM);
  const pos = tileToWorld(t.x,t.y);

  plane.position.set(pos.x,100,pos.z);

  updateTiles();
};

/* ================= CONTROLES ================= */

const keys = {};

window.addEventListener("keydown",e=>keys[e.code]=true);
window.addEventListener("keyup",e=>keys[e.code]=false);

/* ================= LOOP ================= */

function animate(){
  requestAnimationFrame(animate);

  const speed = 2;

  if(keys["KeyW"]) plane.position.z -= speed;
  if(keys["KeyS"]) plane.position.z += speed;
  if(keys["KeyA"]) plane.position.x -= speed;
  if(keys["KeyD"]) plane.position.x += speed;

  if(keys["ShiftLeft"]) plane.position.y += 2;
  if(keys["ControlLeft"]) plane.position.y -= 2;

  /* mover no mundo real */
  currentLat -= (plane.position.z*0.0000001);
  currentLon += (plane.position.x*0.0000001);

  updateTiles();

  camera.position.set(
    plane.position.x,
    plane.position.y+50,
    plane.position.z+100
  );

  camera.lookAt(plane.position);

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
